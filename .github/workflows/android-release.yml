name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update
        required: true
        type: string
      release_name:
        description: Release title
        required: false
        type: string

concurrency:
  group: android-release-${{ inputs.tag_name || github.ref_name || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build APK/AAB
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      EXPO_NO_DOTENV: "1"
      EXPO_NO_CLIENT_ENV_VARS: "1"
      #
      APP_PUBLIC_SENTRY_DSN: ${{ vars.APP_PUBLIC_SENTRY_DSN }}
      APP_PUBLIC_API_BASEURL: ${{ vars.APP_PUBLIC_API_BASEURL }}
      APP_PUBLIC_SITE_URL: ${{ vars.APP_PUBLIC_SITE_URL }}
      APP_PUBLIC_GITHUB_URL: ${{ vars.APP_PUBLIC_GITHUB_URL }}
      #
      APP_RELEASE_STORE_FILE: "release.keystore"
      #
      HAS_ANDROID_KEYSTORE: ${{ secrets.APP_RELEASE_STORE_BASE64 != '' }}
      HAS_GOOGLE_SERVICES: ${{ secrets.APP_GOOGLE_SERVICES_BASE64 != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Android keystore
        if: ${{ env.HAS_ANDROID_KEYSTORE == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          printf '%s' '${{ secrets.APP_RELEASE_STORE_BASE64 }}' | base64 --decode > ${{ env.APP_RELEASE_STORE_FILE }}

      - name: Restore GoogleServices
        if: ${{ env.HAS_GOOGLE_SERVICES == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          printf '%s' '${{ secrets.APP_GOOGLE_SERVICES_BASE64 }}' | base64 --decode > ${{ env.APP_GOOGLE_SERVICES_FILE }}

      - name: Prebuild Android project
        run: pnpm run prebuild
        env:
          APP_RELEASE_STORE_PASSWORD: ${{ secrets.APP_RELEASE_STORE_PASSWORD }}
          APP_RELEASE_KEY_ALIAS: ${{ secrets.APP_RELEASE_KEY_ALIAS }}
          APP_RELEASE_KEY_PASSWORD: ${{ secrets.APP_RELEASE_KEY_PASSWORD }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build Android AAB
        run: pnpm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_ORGANIZATION: ${{ secrets.SENTRY_ORGANIZATION }}
          APP_RELEASE_STORE_PASSWORD: ${{ secrets.APP_RELEASE_STORE_PASSWORD }}
          APP_RELEASE_KEY_ALIAS: ${{ secrets.APP_RELEASE_KEY_ALIAS }}
          APP_RELEASE_KEY_PASSWORD: ${{ secrets.APP_RELEASE_KEY_PASSWORD }}

      - name: Build Android APK
        run: pnpm run build:apk
        env:
          APP_RELEASE_STORE_PASSWORD: ${{ secrets.APP_RELEASE_STORE_PASSWORD }}
          APP_RELEASE_KEY_ALIAS: ${{ secrets.APP_RELEASE_KEY_ALIAS }}
          APP_RELEASE_KEY_PASSWORD: ${{ secrets.APP_RELEASE_KEY_PASSWORD }}

      - name: Rename APK files
        run: pnpm exec tsx scripts/rename-apk.ts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

  release:
    name: Publish release assets
    runs-on: ubuntu-latest
    environment: production
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: android-release-apk
          path: release-assets/apk

      - name: Download AAB artifact
        uses: actions/download-artifact@v8
        with:
          name: android-release-aab
          path: release-assets/aab

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          name: ${{ inputs.release_name || inputs.tag_name || github.ref_name }}
          files: |
            release-assets/apk/**/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
